<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArUco Online Scanner</title>
    <!-- Modern font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Modern Aesthetics - Dark Mode Glassmorphism Theme */
        :root {
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e1b4b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-primary: #8b5cf6;
            --accent-secondary: #3b82f6;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1rem;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        /* Decorative background elements */
        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            top: -200px;
            left: -200px;
            z-index: -1;
            pointer-events: none;
        }
        
        .bg-glow-2 {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            bottom: -100px;
            right: -100px;
            z-index: -1;
            pointer-events: none;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #c4b5fd, #818cf8, #60a5fa);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        p.subtitle {
            font-size: 1.125rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        .main-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        /* Glassmorphism Panel */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        /* Drop Zone */
        .drop-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 300px;
            border: 2px dashed rgba(139, 92, 246, 0.5);
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .drop-zone::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(45deg, rgba(139, 92, 246, 0.1), rgba(59, 130, 246, 0.1));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent-primary);
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.2);
        }

        .drop-zone:hover::before, .drop-zone.dragover::before {
            opacity: 1;
        }

        .upload-icon {
            width: 80px;
            height: 80px;
            color: #a78bfa;
            margin-bottom: 1.5rem;
            transition: transform 0.3s ease;
        }

        .drop-zone:hover .upload-icon {
            transform: translateY(-5px);
        }

        .drop-zone-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            position: relative;
        }

        .drop-zone-desc {
            color: var(--text-muted);
            font-size: 0.95rem;
            position: relative;
        }

        input[type="file"] {
            display: none;
        }

        /* Preview Area */
        .workspace {
            display: none;
            flex-direction: column;
            gap: 2rem;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .workspace.active {
            display: flex;
            opacity: 1;
        }

        .canvas-container {
            width: 100%;
            border-radius: 1rem;
            overflow: hidden;
            position: relative;
            background: rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        canvas {
            max-width: 100%;
            height: auto;
            border-radius: inherit;
            display: block;
        }

        /* Results Area */
        .results-panel {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .results-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            color: #e2e8f0;
        }

        .marker-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 1rem;
        }

        .marker-card {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(16, 185, 129, 0.05));
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 0.75rem;
            padding: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 600;
            color: #34d399;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.8);
        }

        .no-results {
            color: #f87171;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 0.5rem;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.6);
            background: linear-gradient(135deg, #7c3aed, #2563eb);
        }

        /* Loading UI */
        .loader-container {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .loader-container.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .scanner {
            width: 80px;
            height: 80px;
            border: 4px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }

        .scanner::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: var(--accent-primary);
            box-shadow: 0 0 10px var(--accent-primary), 0 0 20px var(--accent-secondary);
            animation: scan 1.5s ease-in-out infinite alternate;
        }

        .loader-text {
            margin-top: 1.5rem;
            font-size: 1.25rem;
            font-weight: 500;
            color: #e2e8f0;
            letter-spacing: 0.05em;
        }

        /* Animations */
        @keyframes scan {
            0% { top: 0; }
            100% { top: calc(100% - 4px); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <!-- OpenCV Loading Overlay -->
    <div class="loader-container" id="loader">
        <div class="scanner"></div>
        <div class="loader-text" id="loaderText">Loading OpenCV Engine...</div>
    </div>

    <header>
        <h1>ArUco Online Scanner</h1>
        <p class="subtitle">Upload an image to detect and decode embedded ArUco patterns.</p>
    </header>

    <main class="main-container">
        <div class="glass-panel">
            
            <!-- Upload Area -->
            <div class="drop-zone" id="dropZone">
                <svg class="upload-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
                <div class="drop-zone-title">Drag & Drop Image Here</div>
                <div class="drop-zone-desc">or click to browse from your device</div>
                <input type="file" id="fileInput" accept="image/png, image/jpeg, image/jpg, image/webp, image/svg+xml, .svg">
            </div>

            <!-- Analysis Workspace (Hidden initially) -->
            <div class="workspace" id="workspace">
                <div class="canvas-container">
                    <canvas id="canvasOutput"></canvas>
                </div>

                <div class="results-panel">
                    <div class="results-header">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                        Detection Report
                    </div>
                    
                    <div id="noResults" class="no-results" style="display: none;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
                        No recognized ArUco markers found in the image.
                    </div>

                    <div class="marker-grid" id="markerGrid">
                        <!-- Markers injected via JS -->
                    </div>
                </div>

                <div style="text-align: center;">
                    <button class="btn" id="resetBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>
                        Process Another Image
                    </button>
                </div>
            </div>

        </div>
    </main>

    <footer style="margin-top: 2rem; text-align: center; color: var(--text-muted); font-size: 0.95rem; animation: fadeInUp 0.8s ease-out 0.4s both;">
        If you like this project, please <a href="https://github.com/kbralten/aruco_online" target="_blank" rel="noopener noreferrer" style="color: var(--accent-primary); text-decoration: none; font-weight: 600;">★ it on GitHub!</a>
    </footer>

    <script>
        // DOM Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const workspace = document.getElementById('workspace');
        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loaderText');
        const markerGrid = document.getElementById('markerGrid');
        const noResults = document.getElementById('noResults');
        const resetBtn = document.getElementById('resetBtn');

        let cvReady = false;
        let currentCanvas = null; // off-screen canvas passed to cv.imread

        // Tuning constants for image pre-processing
        const MIN_MARKER_DIM  = 300;  // scale up images whose smallest dimension is below this (px)
        const MIN_PADDING     = 40;   // minimum white quiet-zone border to add (px)
        const PADDING_RATIO   = 0.15; // quiet-zone border as a fraction of the scaled image's smallest dimension
        const DEFAULT_SVG_DIM = 400;  // fallback render size for SVGs with no explicit dimensions (px)

        // Called when opencv.js script loads
        function onOpenCvReady() {
            console.log('OpenCV.js initialized.');
            cvReady = true;
            setTimeout(() => {
                loader.classList.add('hidden');
            }, 800);
        }

        /**
         * Load any image file (PNG, JPEG, WebP, or SVG) into an off-screen canvas.
         * Small images are scaled up and white padding is added around the image
         * to ensure an adequate quiet zone for ArUco detection.
         */
        function loadFileToCanvas(file) {
            return new Promise((resolve, reject) => {
                const buildCanvas = (img, w, h) => {
                    if (!w || !h) {
                        reject(new Error('Could not determine image dimensions.'));
                        return;
                    }
                    // Scale up very small images so the detector has enough pixels
                    const minDim = Math.min(w, h);
                    const scale = minDim < MIN_MARKER_DIM ? Math.ceil(MIN_MARKER_DIM / minDim) : 1;
                    const scaledW = w * scale;
                    const scaledH = h * scale;
                    // Add a white quiet-zone border around the marker
                    const pad = Math.max(MIN_PADDING, Math.round(Math.min(scaledW, scaledH) * PADDING_RATIO));
                    const canvas = document.createElement('canvas');
                    canvas.width  = scaledW + pad * 2;
                    canvas.height = scaledH + pad * 2;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = 'white';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.imageSmoothingEnabled = false; // keep marker edges crisp
                    ctx.drawImage(img, pad, pad, scaledW, scaledH);
                    resolve(canvas);
                };

                if (file.type === 'image/svg+xml' || file.name.toLowerCase().endsWith('.svg')) {
                    // SVG path: read as text, measure intrinsic size, render to canvas.
                    // cv.imread uses canvas.width/height, which would be 0 for an <img>
                    // element loaded with an SVG src that has no explicit HTML dimensions.
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        let svgW = 0, svgH = 0;
                        try {
                            const parser = new DOMParser();
                            const svgEl = parser.parseFromString(e.target.result, 'image/svg+xml').documentElement;
                            svgW = parseFloat(svgEl.getAttribute('width'))  || 0;
                            svgH = parseFloat(svgEl.getAttribute('height')) || 0;
                            if (!svgW || !svgH) {
                                const vb = (svgEl.getAttribute('viewBox') || '').trim().split(/[\s,]+/);
                                svgW = parseFloat(vb[2]) || DEFAULT_SVG_DIM;
                                svgH = parseFloat(vb[3]) || DEFAULT_SVG_DIM;
                            }
                        } catch (parseErr) {
                            console.warn('SVG dimension parsing failed, falling back to defaults:', parseErr);
                            svgW = svgH = DEFAULT_SVG_DIM;
                        }

                        const url = URL.createObjectURL(new Blob([e.target.result], { type: 'image/svg+xml' }));
                        const img = new Image();
                        img.onload = () => {
                            buildCanvas(img, img.naturalWidth || svgW, img.naturalHeight || svgH);
                            URL.revokeObjectURL(url);
                        };
                        img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('Failed to render SVG.')); };
                        img.src = url;
                    };
                    reader.onerror = () => reject(new Error('Failed to read SVG file.'));
                    reader.readAsText(file);
                } else {
                    // Raster image path (PNG, JPEG, WebP, …)
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload  = () => buildCanvas(img, img.naturalWidth, img.naturalHeight);
                        img.onerror = () => reject(new Error('Failed to decode image.'));
                        img.src = e.target.result;
                    };
                    reader.onerror = () => reject(new Error('Failed to read image file.'));
                    reader.readAsDataURL(file);
                }
            });
        }

        // --- Drag & Drop Handling ---
        const preventDefaults = (e) => { e.preventDefault(); e.stopPropagation(); };

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', (e) => handleFiles(e.dataTransfer.files));
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        resetBtn.addEventListener('click', () => {
            workspace.classList.remove('active');
            currentCanvas = null;
            setTimeout(() => {
                dropZone.style.display = 'flex';
                fileInput.value = '';
                dropZone.style.animation = 'fadeInUp 0.5s ease forwards';
            }, 300);
        });

        function handleFiles(files) {
            if (!cvReady) {
                alert("Please wait for the OpenCV engine to finish loading.");
                return;
            }
            if (files.length === 0) return;

            const file = files[0];
            const isSvg = file.type === 'image/svg+xml' || file.name.toLowerCase().endsWith('.svg');
            if (!file.type.startsWith('image/') && !isSvg) {
                alert("Invalid file format. Please upload a PNG, JPEG, WebP, or SVG image.");
                return;
            }

            loaderText.innerText = "Processing Image...";
            loader.classList.remove('hidden');
            dropZone.style.display = 'none';
            workspace.classList.add('active');

            loadFileToCanvas(file)
                .then(canvas => {
                    currentCanvas = canvas;
                    // Yield to the browser before running heavy CV work
                    setTimeout(() => {
                        analyzeImage();
                        loader.classList.add('hidden');
                        setTimeout(() => { loaderText.innerText = "Loading OpenCV Engine..."; }, 400);
                    }, 50);
                })
                .catch(err => {
                    console.error('Failed to load image:', err);
                    alert('Failed to load image: ' + (err.message || err));
                    loader.classList.add('hidden');
                });
        }

        function analyzeImage() {
            try {
                // Read from the pre-processed off-screen canvas (padded & scaled)
                let src = cv.imread(currentCanvas);

                let rgb = new cv.Mat();
                cv.cvtColor(src, rgb, cv.COLOR_RGBA2RGB);

                let gray = new cv.Mat();
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

                let rgbInverted = new cv.Mat();
                cv.bitwise_not(rgb, rgbInverted);

                let grayInverted = new cv.Mat();
                cv.bitwise_not(gray, grayInverted);

                const variations = [
                    { name: 'RGB',                mat: rgb },
                    { name: 'RGB (Inverted)',      mat: rgbInverted },
                    { name: 'Grayscale',           mat: gray },
                    { name: 'Grayscale (Inverted)', mat: grayInverted }
                ];

                const dictKeys = Object.keys(cv).filter(k => k.startsWith('DICT_'));
                console.log("Testing dictionaries:", dictKeys);

                markerGrid.innerHTML = '';
                let totalMarkersFound = 0;
                // Key is "DICT_NAME:id" so the same ID in different dictionaries each get a card
                const foundMarkerKeys = new Set();

                for (const dictName of dictKeys) {
                    const dict       = cv.getPredefinedDictionary(cv[dictName]);
                    const parameters = new cv.aruco_DetectorParameters();
                    const refineParams = new cv.aruco_RefineParameters(10, 3, true);
                    const detector   = new cv.aruco_ArucoDetector(dict, parameters, refineParams);

                    for (const variation of variations) {
                        const markerCorners      = new cv.MatVector();
                        const markerIds          = new cv.Mat();
                        const rejectedCandidates = new cv.MatVector();

                        detector.detectMarkers(variation.mat, markerCorners, markerIds, rejectedCandidates);

                        if (markerIds.rows > 0) {
                            console.log(`[${dictName}] [${variation.name}] Found ${markerIds.rows} marker(s).`);

                            try {
                                cv.drawDetectedMarkers(rgb, markerCorners, markerIds);
                            } catch (drawErr) {
                                const msg = typeof drawErr === 'number' ? cv.exceptionFromPtr(drawErr).msg : drawErr;
                                console.warn(`Draw failed [${dictName}] [${variation.name}]:`, msg);
                            }

                            for (let i = 0; i < markerIds.rows; ++i) {
                                const id  = markerIds.data32S[i];
                                const key = `${dictName}:${id}`;
                                if (!foundMarkerKeys.has(key)) {
                                    foundMarkerKeys.add(key);
                                    const markerEl = document.createElement('div');
                                    markerEl.className = 'marker-card';
                                    markerEl.style.animationDelay = `${totalMarkersFound * 0.1}s`;
                                    markerEl.style.flexDirection = 'column';
                                    markerEl.style.textAlign = 'center';
                                    markerEl.style.fontSize = '0.9rem';
                                    markerEl.innerHTML = `
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-bottom:0.25rem;"><path d="M3 7V5a2 2 0 0 1 2-2h2"></path><path d="M17 3h2a2 2 0 0 1 2 2v2"></path><path d="M21 17v2a2 2 0 0 1-2 2h-2"></path><path d="M7 21H5a2 2 0 0 1-2-2v-2"></path><rect x="7" y="7" width="10" height="10"></rect></svg>
                                        <div>ID: ${id}</div>
                                        <div style="font-size:0.7rem;opacity:0.8;">${dictName.replace('DICT_', '')}</div>
                                        <div style="font-size:0.6rem;opacity:0.6;margin-top:2px;">${variation.name}</div>
                                    `;
                                    markerGrid.appendChild(markerEl);
                                    totalMarkersFound++;
                                }
                            }
                        }

                        markerCorners.delete();
                        markerIds.delete();
                        rejectedCandidates.delete();
                    }

                    // Always free dictionary and detector objects
                    dict.delete();
                    parameters.delete();
                    refineParams.delete();
                    detector.delete();
                }

                if (totalMarkersFound > 0) {
                    noResults.style.display = 'none';
                    markerGrid.style.display = 'grid';
                } else {
                    noResults.style.display = 'flex';
                    markerGrid.style.display = 'none';
                }

                cv.imshow('canvasOutput', rgb);

                src.delete();
                rgb.delete();
                gray.delete();
                rgbInverted.delete();
                grayInverted.delete();

            } catch (err) {
                const errorMsg = typeof err === 'number' ? cv.exceptionFromPtr(err).msg : err;
                console.error("OpenCV Analysis Error:", errorMsg);
                alert("Failed to analyze image. Error: " + errorMsg);
            }
        }
    </script>
    
    <!-- Load stable OpenCV.js with objdetect (ArUco) -->
    <script async src="https://docs.opencv.org/4.10.0/opencv.js" onload="onOpenCvReady();" type="text/javascript"></script>
</body>
